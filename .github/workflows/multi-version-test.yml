name: Multi-Version Test

on:
  push:
    branches:
      - main
      - dev
      - "release/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:  # Allow manual triggering

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          uv sync --group dev

      - name: Install Playwright browsers
        run: |
          uv run playwright install chromium

      - name: Run tests
        run: |
          uv run pytest tests/ --tb=short --verbose -m "not integration"

  # Integration tests (require browser)
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-22.04
    needs: test
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --group dev

      - name: Install Playwright browsers
        run: |
          uv run playwright install chromium

      - name: Run integration tests
        run: |
          uv run pytest tests/ --tb=short --verbose -m integration

  # Summary job
  test-summary:
    name: Test Summary
    runs-on: ubuntu-22.04
    needs: [test, test-integration]
    if: always()
    
    steps:
      - name: Check test results
        run: |
          echo "Unit tests: ${{ needs.test.result }}"
          echo "Integration tests: ${{ needs.test-integration.result }}"
          
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "❌ Unit tests failed"
            exit 1
          fi
          
          if [[ "${{ needs.test-integration.result }}" != "success" ]]; then
            echo "⚠️ Integration tests failed (non-blocking)"
          fi
          
          echo "✅ All required tests passed"
