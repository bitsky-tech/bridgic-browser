name: Windows CLI Test

on:
  push:
    branches:
      - main
      - dev
      - "release/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  cli-windows:
    name: CLI Test (Windows, Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\uv\cache
            .venv
          key: windows-py${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            windows-py${{ matrix.python-version }}-

      - name: Install dependencies
        run: uv sync --group dev

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\ms-playwright
          key: windows-playwright-${{ hashFiles('uv.lock') }}
          restore-keys: |
            windows-playwright-

      - name: Install Playwright browsers
        run: uv run playwright install chromium

      # ── Navigation ─────────────────────────────────────────────────────────
      - name: CLI — open (auto-starts daemon via TCP transport)
        shell: pwsh
        run: uv run bridgic-browser open https://example.com

      - name: CLI — info
        shell: pwsh
        run: uv run bridgic-browser info

      - name: CLI — reload
        shell: pwsh
        run: uv run bridgic-browser reload

      # ── Snapshot ───────────────────────────────────────────────────────────
      - name: CLI — snapshot (full page)
        shell: pwsh
        run: |
          $out = uv run bridgic-browser snapshot
          Write-Output $out
          $outText = ($out | Out-String)
          # Accept any ref token shape, e.g. e123 or 8-char hash-like ids.
          $hasRef = $outText -match '\[ref=[^\]\r\n]+\]'
          if (-not $hasRef) {
            Write-Error "snapshot output contains no refs"
            exit 1
          }

      - name: CLI — snapshot -i (interactive only)
        shell: pwsh
        run: uv run bridgic-browser snapshot -i

      - name: CLI — snapshot -F (viewport only)
        shell: pwsh
        run: uv run bridgic-browser snapshot -F

      # ── Element interaction via ref ────────────────────────────────────────
      - name: CLI — click first link ref
        shell: pwsh
        run: |
          $snap = uv run bridgic-browser snapshot -i
          # Avoid relying on $Matches automatic variable (can be null for collection matches).
          $snapText = ($snap | Out-String)
          $refMatch = [regex]::Match($snapText, '\[ref=([^\]\r\n]+)\]')
          if ($refMatch.Success) {
            $ref = $refMatch.Groups[1].Value
            Write-Output "Clicking ref: $ref"
            uv run bridgic-browser click $ref
          } else {
            Write-Output "No interactive refs found, skipping click"
          }

      # ── Navigation history ─────────────────────────────────────────────────
      - name: CLI — back
        shell: pwsh
        run: uv run bridgic-browser back

      - name: CLI — forward
        shell: pwsh
        run: uv run bridgic-browser forward

      # ── Wait ───────────────────────────────────────────────────────────────
      - name: CLI — wait (time)
        shell: pwsh
        run: uv run bridgic-browser wait 1

      # ── JavaScript eval ────────────────────────────────────────────────────
      - name: CLI — eval
        shell: pwsh
        run: |
          $title = uv run bridgic-browser eval "document.title"
          Write-Output "Page title: $title"
          if ([string]::IsNullOrWhiteSpace($title)) {
            Write-Error "eval returned empty result"
            exit 1
          }

      # ── Capture ────────────────────────────────────────────────────────────
      - name: CLI — screenshot
        shell: pwsh
        run: |
          uv run bridgic-browser screenshot page.png
          if (-not (Test-Path page.png)) {
            Write-Error "screenshot file not created"
            exit 1
          }
          Write-Output "Screenshot saved: $(Get-Item page.png | Select-Object -ExpandProperty Length) bytes"

      - name: CLI — pdf
        shell: pwsh
        run: |
          uv run bridgic-browser pdf page.pdf
          if (-not (Test-Path page.pdf)) {
            Write-Error "pdf file not created"
            exit 1
          }
          Write-Output "PDF saved: $(Get-Item page.pdf | Select-Object -ExpandProperty Length) bytes"

      # ── Tabs ───────────────────────────────────────────────────────────────
      - name: CLI — tabs
        shell: pwsh
        run: uv run bridgic-browser tabs

      - name: CLI — new-tab and close-tab
        shell: pwsh
        run: |
          $out = uv run bridgic-browser new-tab https://example.com
          Write-Output $out
          # page_id is always an integer; allow page_id: 2, page_id=2, or "page_id": 2.
          $outText = ($out | Out-String)
          $pidMatch = [regex]::Match($outText, '(?m)\b"?page_id"?\b\s*[:=]\s*(\d+)')
          if ($pidMatch.Success) {
            $tabId = $pidMatch.Groups[1].Value
            Write-Output "Closing tab: $tabId"
            uv run bridgic-browser close-tab $tabId
          } else {
            Write-Output "Could not extract page_id, skipping close-tab"
          }

      # ── Storage ────────────────────────────────────────────────────────────
      - name: CLI — cookies
        shell: pwsh
        run: uv run bridgic-browser cookies

      - name: CLI — storage-save and storage-load
        shell: pwsh
        run: |
          uv run bridgic-browser storage-save state.json
          if (-not (Test-Path state.json)) {
            Write-Error "storage-save did not create state.json"
            exit 1
          }
          uv run bridgic-browser storage-load state.json

      # ── Shutdown ───────────────────────────────────────────────────────────
      - name: CLI — close daemon
        shell: pwsh
        run: uv run bridgic-browser close

      - name: Verify — run-info cleaned up after close
        shell: pwsh
        run: |
          $runInfo = "$env:USERPROFILE\.bridgic\bridgic-browser\run\daemon.json"
          # Daemon responds to close immediately but cleans up asynchronously;
          # poll for up to 30 seconds before declaring failure.
          $timeout = 30
          $elapsed = 0
          while ((Test-Path $runInfo) -and ($elapsed -lt $timeout)) {
            Start-Sleep -Seconds 1
            $elapsed++
          }
          if (Test-Path $runInfo) {
            Write-Error "Run info still exists after close (waited ${elapsed}s): $runInfo"
            exit 1
          }
          Write-Output "OK: daemon cleaned up correctly (${elapsed}s)"
