# Skill package dependencies. Consumed by install-deps.sh.
#
# Format per package:
#   [<package-name>]
#   source  = "default" | "<private-index-name>"   # "default" = public PyPI
#   version = "<PEP 508 specifier>"                 # optional; MUST start with an operator
#
# Version examples (operator is REQUIRED):
#   version = "==0.0.4"           # exact pin
#   version = ">=0.0.4,<0.1"      # range
#   version = "~=0.0.4"           # compatible release
# Omit `version` entirely to install/keep whatever is already resolved.
#
# NOTE: main-branch CI (skill-install-deps-check.yml) rejects any source
# other than "default". Private indexes are a dev-only convenience; switch
# everything back to "default" before merging to main.

[bridgic-browser]
source = "default"
